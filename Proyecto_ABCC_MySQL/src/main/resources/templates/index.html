<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Servicios Escolares - ABCC</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <h2 class="text-center text-danger mb-4">Servicios Escolares</h2>

    <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center">
            <span>Listado de Alumnos</span>
            <button class="btn btn-primary" onclick="abrirModal()">AGREGAR</button>
        </div>
        <div class="card-body">
            <input type="text" id="busqueda" class="form-control mb-3" placeholder="🔍 Buscar por nombre, control o carrera..." onkeyup="filtrarTabla()">
            
            <table class="table table-bordered table-striped">
                <thead class="table-light">
                    <tr>
                        <th>Num. Control</th><th>Nombre</th><th>Primer Ap.</th><th>Segundo Ap.</th>
                        <th>Semestre</th><th>Carrera</th><th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tabla-alumnos"></tbody>
            </table>
        </div>
    </div>
</div>

<div class="modal fade" id="modalAlumno" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header"><h5 id="modalTitle">Registrar Alumno</h5></div>
            <div class="modal-body">
                <form id="form-alumno">
                    <input type="hidden" id="id">
                    
                    <input type="text" id="numControl" class="form-control mb-2" placeholder="Num. Control" required>
                    <input type="text" id="nombre" class="form-control mb-2" placeholder="Nombre" required>
                    <input type="text" id="primerAp" class="form-control mb-2" placeholder="Primer Apellido" required>
                    <input type="text" id="segundoAp" class="form-control mb-2" placeholder="Segundo Apellido">
                    <input type="number" id="semestre" class="form-control mb-2" placeholder="Semestre">
                    <input type="text" id="carrera" class="form-control mb-2" placeholder="Carrera">
                    <button type="submit" class="btn btn-success w-100">Guardar Alumno</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const bsModal = new bootstrap.Modal(document.getElementById('modalAlumno'));

    async function cargarAlumnos() {
        const res = await fetch('/api/alumnos');
        const data = await res.json();
        document.getElementById('tabla-alumnos').innerHTML = data.map(a => `
            <tr>
                <td>${a.numControl}</td><td>${a.nombre}</td><td>${a.primerAp}</td>
                <td>${a.segundap || ''}</td><td>${a.semestre}</td><td>${a.carrera}</td>
                <td>
                    <button class="btn btn-warning btn-sm" onclick='editarAlumno(${JSON.stringify(a)})'>Editar</button>
                    <button class="btn btn-danger btn-sm" onclick="eliminarAlumno(${a.id})">Eliminar</button>
                </td>
            </tr>
        `).join('');
    }

    function filtrarTabla() {
        const texto = document.getElementById('busqueda').value.toLowerCase();
        const filas = document.querySelectorAll('#tabla-alumnos tr');
        filas.forEach(fila => {
            fila.style.display = fila.innerText.toLowerCase().includes(texto) ? '' : 'none';
        });
    }

    function abrirModal() {
        document.getElementById('modalTitle').innerText = "Registrar Alumno";
        document.getElementById('form-alumno').reset();
        document.getElementById('id').value = '';
        bsModal.show();
    }

    function editarAlumno(alumno) {
        document.getElementById('modalTitle').innerText = "Editar Alumno";
        document.getElementById('id').value = alumno.id;
        document.getElementById('numControl').value = alumno.numControl;
        document.getElementById('nombre').value = alumno.nombre;
        document.getElementById('primerAp').value = alumno.primerAp;
        document.getElementById('segundoAp').value = alumno.segundap || '';
        document.getElementById('semestre').value = alumno.semestre;
        document.getElementById('carrera').value = alumno.carrera;
        bsModal.show();
    }

    async function eliminarAlumno(id) {
        if(confirm('¿Seguro que deseas eliminar este registro?')) {
            await fetch(`/api/alumnos/${id}`, { method: 'DELETE' });
            cargarAlumnos();
        }
    }

    document.getElementById('form-alumno').addEventListener('submit', async (e) => {
        e.preventDefault();
        const alumno = {
            id: document.getElementById('id').value || null,
            numControl: document.getElementById('numControl').value,
            nombre: document.getElementById('nombre').value,
            primerAp: document.getElementById('primerAp').value,
            segundap: document.getElementById('segundoAp').value,
            semestre: document.getElementById('semestre').value,
            carrera: document.getElementById('carrera').value
        };
        
        const esEdicion = document.getElementById('modalTitle').innerText === "Editar Alumno";
        await fetch('/api/alumnos', {
            method: esEdicion ? 'PUT' : 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(alumno)
        });
        
        bsModal.hide();
        cargarAlumnos();
    });

    document.addEventListener('DOMContentLoaded', cargarAlumnos);
</script>
</body>
</html>
