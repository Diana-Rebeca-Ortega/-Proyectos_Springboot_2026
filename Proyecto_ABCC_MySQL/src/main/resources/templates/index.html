<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Servicios Escolares - ABCC</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <h2 class="text-center text-danger mb-4">Servicios Escolares</h2>

    <ul class="nav nav-tabs" id="myTab">
        <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#alumnos">Alumnos</button></li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#materias">Materias</button></li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#actividades">Actividades</button></li>
    </ul>

    <div class="tab-content p-4 bg-white border border-top-0">
        <div class="tab-pane fade show active" id="alumnos">
            <div class="text-end mb-3">
                <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalRegistro" onclick="prepararFormulario('Alumno')">AGREGAR ALUMNO</button>
            </div>
            <table class="table table-striped">
                <thead><tr><th>Control</th><th>Nombre</th><th>Carrera</th><th>Acciones</th></tr></thead>
                <tbody>
                    <tr th:each="a : ${listaAlumnos}">
                        <td th:text="${a.numControl}"></td>
                        <td th:text="${a.nombre}"></td>
                        <td th:text="${a.carrera}"></td>
                        <td>
                            <button class="btn btn-sm btn-warning">Editar</button>
                            <button class="btn btn-sm btn-danger">Eliminar</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="tab-pane fade" id="materias">
            <div class="text-end mb-3">
                <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalRegistro" onclick="prepararFormulario('Materia')">AGREGAR MATERIA</button>
            </div>
            <table class="table table-striped">
                <thead><tr><th>ID</th><th>Nombre Materia</th><th>Créditos</th></tr></thead>
                <tbody>
                    <tr th:each="m : ${listaMaterias}">
                        <td th:text="${m.id}"></td>
                        <td th:text="${m.nombreMateria}"></td>
                        <td th:text="${m.creditos}"></td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="tab-pane fade" id="actividades">
            <div class="text-end mb-3">
                <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalRegistro" onclick="prepararFormulario('Actividad')">AGREGAR ACTIVIDAD</button>
            </div>
            <table class="table table-striped">
                <thead><tr><th>ID</th><th>Actividad</th><th>Instructor</th></tr></thead>
                <tbody>
                    <tr th:each="act : ${listaActividades}">
                        <td th:text="${act.id}"></td>
                        <td th:text="${act.nombreActividad}"></td>
                        <td th:text="${act.instructor}"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div class="modal fade" id="modalRegistro" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header"><h5 id="modalTitle">Registrar</h5></div>
            <div class="modal-body">
                <form id="form-registro">
                    <input type="text" class="form-control mb-2" placeholder="Nombre / Dato principal" required>
                    <input type="text" class="form-control mb-2" placeholder="Detalle adicional" required>
                    <button type="submit" class="btn btn-success w-100">Guardar</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function prepararFormulario(tipo) {
        document.getElementById('modalTitle').innerText = 'Registrar ' + tipo;
    }
</script>
</body>
</html>
