<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Servicios Escolares - Sistema ABCC</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <h2 class="text-center text-danger mb-4">Servicios Escolares</h2>
    <ul class="nav nav-tabs" id="myTab">
        <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#alumnos">Alumnos</button></li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#materias">Materias</button></li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#actividades">Actividades</button></li>
    </ul>

    <div class="tab-content p-4 bg-white border border-top-0">
        <div class="tab-pane fade show active" id="alumnos">
            <button class="btn btn-primary mb-3" onclick="abrirModal('Alumno', null)">AGREGAR ALUMNO</button>
            <table class="table table-bordered table-striped">
                <thead><tr><th>Control</th><th>Nombre</th><th>Apellidos</th><th>Fecha Nac.</th><th>Semestre</th><th>Carrera</th><th>Acciones</th></tr></thead>
                <tbody>
                    <tr th:each="a : ${listaAlumnos}">
                        <td th:text="${a.numControl}"></td>
                        <td th:text="${a.nombre}"></td>
                        <td th:text="${a.primerAp + ' ' + a.segundap}"></td>
                        <td th:text="${a.fechaNac}"></td>
                        <td th:text="${a.semestre}"></td>
                        <td th:text="${a.carrera}"></td>
                        <td>
                            <button class="btn btn-sm btn-warning" th:onclick="'editar(\'Alumno\','+${a.id}+')'">Editar</button>
                            <button class="btn btn-sm btn-danger" th:onclick="'eliminar(\'alumnos\','+${a.id}+')'">Eliminar</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="tab-pane fade" id="materias">
            <button class="btn btn-primary mb-3" onclick="abrirModal('Materia', null)">AGREGAR MATERIA</button>
            <table class="table table-bordered table-striped">
                <thead><tr><th>ID</th><th>Nombre Materia</th><th>Créditos</th><th>Acciones</th></tr></thead>
                <tbody>
                    <tr th:each="m : ${listaMaterias}">
                        <td th:text="${m.id}"></td>
                        <td th:text="${m.nombreMateria}"></td>
                        <td th:text="${m.creditos}"></td>
                        <td>
                            <button class="btn btn-sm btn-warning" th:onclick="'editar(\'Materia\','+${m.id}+')'">Editar</button>
                            <button class="btn btn-sm btn-danger" th:onclick="'eliminar(\'materias\','+${m.id}+')'">Eliminar</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="tab-pane fade" id="actividades">
            <button class="btn btn-primary mb-3" onclick="abrirModal('Actividad', null)">AGREGAR ACTIVIDAD</button>
            <table class="table table-bordered table-striped">
                <thead><tr><th>ID</th><th>Nombre Actividad</th><th>Instructor</th><th>Acciones</th></tr></thead>
                <tbody>
                    <tr th:each="act : ${listaActividades}">
                        <td th:text="${act.id}"></td>
                        <td th:text="${act.nombreActividad}"></td>
                        <td th:text="${act.instructor}"></td>
                        <td>
                            <button class="btn btn-sm btn-warning" th:onclick="'editar(\'Actividad\','+${act.id}+')'">Editar</button>
                            <button class="btn btn-sm btn-danger" th:onclick="'eliminar(\'actividades\','+${act.id}+')'">Eliminar</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div class="modal fade" id="modalForm" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header"><h5 id="tituloModal">Formulario</h5></div>
            <div class="modal-body">
                <form id="formularioEntidad">
                    <input type="hidden" id="idEntidad">
                    <div id="camposDinamicos"></div>
                    <button type="submit" class="btn btn-success mt-3 w-100">Guardar Registro</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    // Inicialización del modal
    const modalElement = document.getElementById('modalForm');
    const modal = new bootstrap.Modal(modalElement);

    // Función para abrir el modal (Agregar)
    function abrirModal(tipo, id) {
        document.getElementById('tituloModal').innerText = (id ? 'Editar ' : 'Registrar ') + tipo;
        let html = '';
        
        if(tipo === 'Alumno') {
            html = `<input type="hidden" id="id" value="${id || ''}">
                    <input type="text" id="numControl" class="form-control mb-2" placeholder="Num Control">
                    <input type="text" id="nombre" class="form-control mb-2" placeholder="Nombre">
                    <input type="text" id="primerAp" class="form-control mb-2" placeholder="Primer Apellido">
                    <input type="text" id="segundap" class="form-control mb-2" placeholder="Segundo Apellido">
                    <input type="date" id="fechaNac" class="form-control mb-2">
                    <input type="number" id="semestre" class="form-control mb-2" placeholder="Semestre">
                    <input type="text" id="carrera" class="form-control mb-2" placeholder="Carrera">`;
        } else if(tipo === 'Materia') {
            html = `<input type="hidden" id="id" value="${id || ''}">
                    <input type="text" id="nombreMateria" class="form-control mb-2" placeholder="Nombre Materia">
                    <input type="number" id="creditos" class="form-control mb-2" placeholder="Créditos">`;
        } else {
            html = `<input type="hidden" id="id" value="${id || ''}">
                    <input type="text" id="nombreActividad" class="form-control mb-2" placeholder="Nombre Actividad">
                    <input type="text" id="instructor" class="form-control mb-2" placeholder="Instructor">`;
        }
        
        document.getElementById('camposDinamicos').innerHTML = html;
        
        // Si hay ID, buscamos los datos (opcional: precarga)
        if(id) {
            fetch('/api/' + tipo.toLowerCase() + 's/' + id)
                .then(res => res.json())
                .then(data => {
                    for(let key in data) {
                        let el = document.getElementById(key);
                        if(el) el.value = data[key];
                    }
                });
        }
        modal.show();
    }

    // AÑADE ESTA FUNCIÓN QUE TE FALTABA
    function editar(tipo, id) {
        abrirModal(tipo, id);
    }

    function eliminar(entidad, id) {
        if(confirm('¿Desea borrar permanentemente este registro?')) {
            fetch('/api/' + entidad + '/' + id, { method: 'DELETE' }).then(() => location.reload());
        }
    }

    document.getElementById('formularioEntidad').addEventListener('submit', function(e) {
        e.preventDefault();
        const titulo = document.getElementById('tituloModal').innerText;
        const tipo = titulo.split(' ').pop();
        const id = document.getElementById('id').value;
        const datos = {};
        
        this.querySelectorAll('input').forEach(i => { if(i.id) datos[i.id] = i.value; });
        
        // Si hay ID es PUT (actualizar), si no es POST (crear)
        fetch('/api/' + tipo.toLowerCase() + 's' + (id ? '/' + id : ''), {
            method: id ? 'PUT' : 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(datos)
        }).then(() => { modal.hide(); location.reload(); });
    });
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
